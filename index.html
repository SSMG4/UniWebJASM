<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UWP.js – Unity Web Player Emulator</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lz4js@1.3.2/build/lz4.min.js" defer></script>
</head>
<body>
    <header>
        <h1>UWP.js</h1>
        <button id="theme-toggle">🌙</button>
    </header>
    <main>
        <section id="upload-section">
            <label for="unity-file">Choose a Unity Web Player (.unity3d) file:</label>
            <input type="file" id="unity-file" accept=".unity3d" />
            <div id="status"></div>
        </section>
        <section id="game-container">
            <div id="asset-list" class="asset-list">
                <p class="placeholder">Upload a .unity3d file to inspect assets, images and extracted assemblies.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>UWP.js • Open Source</p>
    </footer>
    <script src="script.js"></script>
    <script type="module" src="emulator.js"></script>
</body>
</html>

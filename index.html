<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UWP.js – Unity Web Player Emulator</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>UWP.js</h1>
        <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </header>
    <main>
        <section id="upload-section">
            <label for="unity-file">Unity Web Player file (.unity3d)</label>
            <input type="file" id="unity-file" accept=".unity3d" />
            <div id="status"></div>
        </section>
        <section id="game-container">
            <div id="asset-list" class="asset-list">
                <p class="placeholder">Upload a .unity3d file to extract and inspect its assets.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>UWP.js &bull; Open Source</p>
    </footer>
    <script src="script.js"></script>
    <script type="module" src="emulator.js"></script>
</body>
</html>
